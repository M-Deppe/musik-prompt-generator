    <rect x="100" y="100" width="36" height="100" rx="6"/>
    <rect x="150" y="20"  width="36" height="180" rx="6"/>
    <rect x="200" y="80"  width="36" height="120" rx="6"/>
    <rect x="250" y="40"  width="36" height="160" rx="6"/>
    <rect x="300" y="100" width="36" height="100" rx="6"/>
  </g>
</svg>
